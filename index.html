<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Padelazo - Premium Experience</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body style="background-color: #050505; color: #ffffff;">
    <div class="app-container">
        <!-- Header -->
        <header class="animate-fade-in" style="margin-bottom: 32px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h1 class="title-gradient" style="font-size: 2.2rem; line-height: 1;">PADELAZO</h1>
                    <p style="font-size: 10px; color: var(--primary); font-weight: 800; letter-spacing: 2px;">PREMIUM EXPERIENCE</p>
                </div>
                <div id="header-avatar" style="width: 42px; height: 42px; border-radius: 50%; border: 2px solid var(--primary); display: flex; align-items: center; justify-content: center; font-weight: 900; color: var(--primary); background: var(--secondary);">J</div>
            </div>
        </header>

        <!-- View: Home -->
        <section id="view-home" class="view animate-fade-in">
            <div class="card" style="border-left: 4px solid var(--primary);">
                <h2 style="margin-bottom: 20px;">Nuevo Padelazo</h2>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                    <button class="btn btn-primary" onclick="app.showSetup('americano')" style="grid-column: span 2;">Americano</button>
                    <button class="btn btn-secondary" onclick="app.showSetup('robin')">Todos v Todos</button>
                    <button class="btn btn-secondary" onclick="app.showSetup('rey')">Rey Cancha</button>
                </div>
            </div>

            <div id="active-tournament-card"></div>
            <div id="history-container"></div>
        </section>

        <!-- View: Setup -->
        <section id="view-setup" class="view hidden animate-fade-in">
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                    <h2 id="setup-title" style="font-size: 18px;">Configuración</h2>
                    <button class="btn btn-secondary" style="padding: 8px 16px; width: auto; font-size: 12px;" onclick="app.showView('home')">Cancelar</button>
                </div>
                
                <div class="input-group" style="margin-bottom: 20px;">
                    <label>Nombre del Torneo</label>
                    <input type="text" id="input-tournament-name" placeholder="Ej: Padel & Birras">
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
                    <div class="input-group">
                        <label>Canchas</label>
                        <input type="number" id="input-courts" value="1" min="1" onchange="app.updateCourtInputs()">
                    </div>
                    <div class="input-group" id="setup-group-mode">
                        <label>Modo</label>
                        <select id="input-americano-type">
                            <option value="individual">Individual</option>
                            <option value="pareja">Por Pareja</option>
                        </select>
                    </div>
                </div>

                <div class="input-group" style="margin-bottom: 24px;">
                    <label>Tipo de Marcador</label>
                    <select id="input-score-type">
                        <option value="normal">Normal (15-30-40-Oro)</option>
                        <option value="tiebreak">Tie Break (a 7)</option>
                        <option value="supertie">Super Tie (a 11)</option>
                    </select>
                </div>

                <div id="court-names-container" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px;"></div>

                <div class="input-group">
                    <label>Participantes</label>
                    <div id="players-list" style="display: flex; flex-direction: column; gap: 10px;"></div>
                    <button class="btn btn-secondary" onclick="app.addPlayerRow()" style="margin-top: 12px; border: 2px dashed var(--glass-border); background: transparent;">+ Añadir Integrante</button>
                </div>

                <button class="btn btn-primary" style="margin-top: 32px; padding: 22px; font-size: 17px;" onclick="app.startTournament()">VAMOS A JUGAR</button>
            </div>
        </section>

        <!-- View: Dashboard -->
        <section id="view-dashboard" class="view hidden animate-fade-in">
            <div class="tab-nav">
                <button id="tab-matches" class="tab-btn active" onclick="app.setDashboardTab('matches')">PARTIDOS</button>
                <button id="tab-ranking" class="tab-btn" onclick="app.setDashboardTab('ranking')">RANKING</button>
            </div>
            <div id="dashboard-matches"><div id="matches-content"></div></div>
            <div id="dashboard-ranking" class="hidden"><div id="leaderboard-content" style="display: flex; flex-direction: column; gap: 12px;"></div></div>
        </section>

        <!-- View: Score Entry -->
        <section id="view-score" class="view hidden animate-fade-in">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                <span id="score-court-label" style="font-size: 11px; font-weight: 900; color: var(--primary); letter-spacing: 2px;">CANCHA</span>
                <button class="btn btn-secondary" style="padding: 8px 16px; width: auto; font-size: 11px;" onclick="app.showView('dashboard')">REGRESAR</button>
            </div>

            <div id="point-tracker-ui"></div>

            <div class="card" style="margin-top: 32px; border: 1px solid var(--glass-border);">
                <label style="font-size: 10px; color: var(--text-dim); margin-bottom: 12px; display: block; font-weight: 800;">RESULTADO FINAL DIRECTO</label>
                <div style="display: flex; gap: 15px; align-items: center;">
                    <input type="number" id="manual-score-1" style="text-align: center; font-size: 32px; height: 75px;" placeholder="0">
                    <span style="font-weight: 900; color: var(--primary);">VS</span>
                    <input type="number" id="manual-score-2" style="text-align: center; font-size: 32px; height: 75px;" placeholder="0">
                </div>
            </div>

            <button class="btn btn-primary" style="margin-top: 24px; padding: 22px;" onclick="app.submitScore()">GUARDAR MARCADOR</button>
        </section>

        <!-- View: Global Stats -->
        <section id="view-stats" class="view hidden animate-fade-in">
            <h2 style="margin-bottom: 24px; text-align: center; font-size: 20px;">Ranking Global</h2>
            <div id="global-stats-content"></div>
        </section>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <div class="nav-item active" onclick="app.showView('home')" id="nav-home">
                <span class="nav-icon">🏠</span>
                <span>Inicio</span>
            </div>
            <div class="nav-item" onclick="app.showDashboardIfActive()" id="nav-dash">
                <span class="nav-icon">🎾</span>
                <span>Torneo</span>
            </div>
            <div class="nav-item" onclick="app.showGlobalStats()" id="nav-stats">
                <span class="nav-icon">🏆</span>
                <span>Ranking</span>
            </div>
        </nav>
    </div>

    <!-- Scripts -->
    <script src="js/storage.js"></script>
    <script src="js/engine.js"></script>
    <script src="js/ui.js"></script>
</body>
</html>
